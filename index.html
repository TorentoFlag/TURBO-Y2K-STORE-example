<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TURBO Y2K STORE</title>
    <!-- Шрифт -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ============================================================
           CSS STYLES
           ============================================================ */
        :root {
            --neon-pink: #FF2D7B;
            --neon-blue: #00D4FF;
            --neon-green: #7BFF00;
            --neon-yellow: #FFE500;
            --bg-dark: #0A0612;
            --chrome: linear-gradient(135deg, #FF2D7B, #FFE500, #00D4FF, #7BFF00, #FF2D7B);
            --mouse-x: 50;
            --mouse-y: 50;
        }

        * { box-sizing: border-box; margin: 0; }
        body { 
            margin: 0; 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Chakra Petch', sans-serif; 
            overflow-x: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        /* Animations */
        @keyframes gradShift { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }
        @keyframes floatSlow { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-12px); } 
        }
        @keyframes spin { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }
        @keyframes pulse { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0.4; } 
        }
        @keyframes ticker { 
            0% { transform: translateX(0); } 
            100% { transform: translateX(-33.33%); } 
        }

        /* Utilities */
        .glass {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .chrome-text {
            background: var(--chrome);
            background-size: 300% 300%;
            animation: gradShift 4s ease infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .chrome-bg {
            background: var(--chrome);
            background-size: 300% 300%;
            animation: gradShift 4s ease infinite;
        }
        .pill-btn {
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6);
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        .pill-btn.active {
            border-color: var(--color, var(--neon-pink));
            background: rgba(255,255,255,0.05); /* Simplified for vanilla */
            color: var(--color, var(--neon-pink));
        }
        
        button { font-family: 'Chakra Petch', sans-serif; }
        input, select { font-family: 'Chakra Petch', sans-serif; }

        /* Layout */
        #app { min-height: 100vh; display: flex; flex-direction: column; }
        main { flex: 1; }
        
        /* Toast */
        #toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            z-index: 1000;
            display: none;
            box-shadow: 0 0 40px rgba(255, 45, 123, 0.27), 0 0 80px rgba(0, 212, 255, 0.14);
            color: #0A0612;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <!-- Content will be rendered here by JS -->

<div id="toast"></div>

<script>

        { id:4, n:"Nuptse 700 Down", b:"THE NORTH FACE", c:"camp", p:32990, op:39990, r:4.9, rv:312, sz:["S","M","L","XL","XXL"], cl:["#1a1a1a","#FFE500","#00D4FF"], d:"Иконический пуховик 700 fill power. Из гималайских экспедиций — в городские джунгли.", tag:"♛ TOP" },
        { id:5, n:"Redster S9 FIS", b:"ATOMIC", c:"ski", p:89990, op:109990, r:4.6, rv:45, sz:["155","160","165","170","175"], cl:["#FF2D7B"], d:"FIS-гоночные лыжи. Карбоновый сердечник. Для тех, кто считает сотые.", tag:"◆ PRO" },
        { id:6, n:"Custom X Camber", b:"BURTON", c:"snow", p:64990, op:null, r:4.8, rv:78, sz:["154","156","158","160","162"], cl:["#1a1a1a"], d:"Жёсткий кембер + карбон. Абсолютный контроль на любой скорости.", tag:null },
        { id:7, n:"HOVR Phantom 3", b:"UNDER ARMOUR", c:"fit", p:16490, op:19990, r:4.5, rv:98, sz:["40","41","42","43","44","45"], cl:["#1a1a1a","#F0F0F0","#FF2D7B"], d:"Энергоотдача HOVR + встроенный датчик = умная тренировка в каждом шаге.", tag:"⚡ SMART" },
        { id:8, n:"Titanium OutDry EX", b:"COLUMBIA", c:"camp", p:24990, op:29990, r:4.4, rv:67, sz:["S","M","L","XL"], cl:["#1a1a1a","#7BFF00","#00D4FF"], d:"Мембрана снаружи. Революционная конструкция OutDry Extreme.", tag:null },
        { id:9, n:"Gel-Kayano 30", b:"ASICS", c:"run", p:17490, op:null, r:4.7, rv:201, sz:["40","41","42","43","44","45"], cl:["#00D4FF","#1a1a1a","#FF8800"], d:"30 лет эволюции. FF Blast+ и 4D Guidance = стабильность на марафоне.", tag:null },
        { id:10, n:"Deviate Nitro 2", b:"PUMA", c:"run", p:15990, op:18990, r:4.6, rv:134, sz:["39","40","41","42","43","44","45"], cl:["#F0F0F0","#FF2D7B","#FFE500"], d:"Карбоновая пластина NITRO ELITE. Каждый шаг — ускорение.", tag:"↑ FAST" },
        { id:11, n:"FuelCell Elite v2", b:"NEW BALANCE", c:"run", p:22990, op:27990, r:4.8, rv:89, sz:["40","41","42","43","44"], cl:["#FF2D7B","#00D4FF","#F0F0F0"], d:"Двойная карбоновая пластина. Пена FuelCell. Рекорд ждёт.", tag:"☆ RACE" },
        { id:12, n:"Nano X3", b:"REEBOK", c:"fit", p:11990, op:14990, r:4.5, rv:167, sz:["39","40","41","42","43","44","45","46"], cl:["#1a1a1a","#F0F0F0","#FF8800"], d:"Кроссфит. Тяжёлая атлетика. Бег. Прыжки. Одни кроссовки для всего.", tag:null },
    ];

    // Helpers
    const fmt = v => v.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + " ₽";
    const pct = (p, o) => o ? Math.round((1 - p / o) * 100) : 0;
    const catOf = id => CATS.find(c => c.id === id);
    
    // Colors
    const neonPink = "#FF2D7B";
    const neonBlue = "#00D4FF";
    const neonGreen = "#7BFF00";
    const neonYellow = "#FFE500";

    // ============================================================
    // STATE MANAGEMENT
    // ============================================================
    const state = {
        page: 'home', // home, catalog, product, cart, checkout
        cart: [],
        favs: [],
        product: null,
        catFilter: null,
        brandFilter: [],
        search: "",
        sort: "popular",
        checkoutStep: 1,
        ordered: false,
        sizeSelection: {}, // { productId: size }
        colorSelection: {}  // { productId: color }
    };

    // ============================================================
    // CORE FUNCTIONS
    // ============================================================
    
    function notify(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        toast.style.background = 'var(--chrome)';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2500);
    }

    function addToCart(p, s, c) {
        const k = `${p.id}-${s}-${c}`;
        const existing = state.cart.find(i => i.k === k);
        if (existing) {
            existing.q += 1;
        } else {
            state.cart.push({ k, p, s, c, q: 1 });
        }
        notify("⚡ ДОБАВЛЕНО!");
        render();
    }

    function removeFromCart(k) {
        state.cart = state.cart.filter(i => i.k !== k);
        render();
    }

    function updateQty(k, d) {
        const item = state.cart.find(i => i.k === k);
        if (item) {
            item.q = Math.max(1, item.q + d);
            render();
        }
    }

    function toggleFav(id) {
        if (state.favs.includes(id)) {
            state.favs = state.favs.filter(i => i !== id);
        } else {
            state.favs.push(id);
        }
        render();
    }

    function navigate(page, data = null) {
        state.page = page;
        if (page === 'product') state.product = data;
        if (page === 'catalog') {
            state.catFilter = data;
            state.search = "";
            state.brandFilter = [];
        }
        if (page === 'home') {
            state.catFilter = null;
            state.search = "";
            state.brandFilter = [];
        }
        window.scrollTo(0, 0);
        render();
    }

    function getFilteredProducts() {
        let l = [...PRODS];
        if (state.catFilter) l = l.filter(p => p.c === state.catFilter);
        if (state.brandFilter.length) l = l.filter(p => state.brandFilter.includes(p.b));
        if (state.search) { 
            const s = state.search.toLowerCase(); 
            l = l.filter(p => p.n.toLowerCase().includes(s) || p.b.toLowerCase().includes(s)); 
        }
        switch (state.sort) { 
            case "pa": l.sort((a,b)=>a.p-b.p); break; 
            case "pd": l.sort((a,b)=>b.p-a.p); break; 
            case "r": l.sort((a,b)=>b.r-a.r); break; 
            default: l.sort((a,b)=>b.rv-a.rv); 
        }
        return l;
    }

    function getTotal() {
        return state.cart.reduce((s, i) => s + i.p.p * i.q, 0);
    }

    function getCount() {
        return state.cart.reduce((s, i) => s + i.q, 0);
    }

    // ============================================================
    // COMPONENT RENDERERS (HTML Strings)
    // ============================================================

    function renderHeader() {
        const cnt = getCount();
        const favCount = state.favs.length;
        const navItems = [
            { l: "КАТАЛОГ", action: "navigate", args: "['catalog', null]" },
            { l: "SALE ★", action: "navigate", args: "['catalog', null]", hot: true },
            { l: "БРЕНДЫ", action: "navigate", args: "['catalog', null]" },
        ];

        return `
        <header style="position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.06); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border-bottom: 1px solid rgba(255,255,255,0.06);">
            <!-- Ticker -->

                <div style="display: flex; gap: 60; white-space: nowrap; animation: ticker 30s linear infinite;">
                    ${['⚡ БЕСПЛАТНАЯ ДОСТАВКА ОТ 5000₽', '★ НОВАЯ КОЛЛЕКЦИЯ SPRING 2026', '♛ ВОЗВРАТ 30 ДНЕЙ', '◆ 100% ОРИГИНАЛ', '↑ СКИДКИ ДО 50%', '☆ +5000 БОНУСОВ НОВЫМ'].map(m => 
                        `<span style="font-family: 'Chakra Petch', sans-serif; font-size: 11; letter-spacing: 2px; color: rgba(255,255,255,0.4); font-weight: 500;">${m}</span>`
                    ).join('')}
                     ${['⚡ БЕСПЛАТНАЯ ДОСТАВКА ОТ 5000₽', '★ НОВАЯ КОЛЛЕКЦИЯ SPRING 2026', '♛ ВОЗВРАТ 30 ДНЕЙ', '◆ 100% ОРИГИНАЛ', '↑ СКИДКИ ДО 50%', '☆ +5000 БОНУСОВ НОВЫМ'].map(m => 
                        `<span style="font-family: 'Chakra Petch', sans-serif; font-size: 11; letter-spacing: 2px; color: rgba(255,255,255,0.4); font-weight: 500;">${m}</span>`
                    ).join('')}
                </div>
            </div>
            
            <div style="max-width: 1400; margin: 0 auto; padding: 0 32px; display: flex; align-items: center; height: 72; gap: 24;">
                <!-- Logo -->
                <div onclick="navigate('home')" style="cursor: pointer; display: flex; align-items: center; gap: 12; flex-shrink: 0;">
                    <div style="width: 42; height: 42; border-radius: 50%; background: var(--chrome); background-size: 300% 300%; animation: gradShift 4s ease infinite; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px ${neonPink}44, 0 0 40px ${neonBlue}22;">
                        <div style="width: 36; height: 36; border-radius: 50%; background: #0A0612; display: flex; align-items: center; justify-content: center;">
                            <span class="chrome-text" style="font-family: 'Chakra Petch', sans-serif; font-size: 16; font-weight: 700;">T</span>
                        </div>
                    </div>
                    <div>
                        <span class="chrome-text" style="font-family: 'Chakra Petch', sans-serif; font-size: 20; font-weight: 700; letter-spacing: 3px;">TURBO</span>
                        <span style="display: block; font-family: 'Chakra Petch', sans-serif; font-size: 8; letter-spacing: 4px; color: rgba(255,255,255,0.3); margin-top: -2;">SPORT.FUTURE</span>
                    </div>
                </div>

                <!-- Nav -->
                <nav style="display: flex; gap: 4; flex: 1; margin-left: 20;">
                    ${navItems.map(n => `
                        <button onclick="navigate('catalog', null)" style="border: none; background: none; padding: 8px 18px; cursor: pointer; font-family: 'Chakra Petch', sans-serif; font-size: 12; font-weight: 600; letter-spacing: 2px; color: ${n.hot ? neonPink : 'rgba(255,255,255,0.5)'}; border-radius: 20; transition: all 0.25s;"
                        onmouseover="this.style.background='rgba(255,255,255,0.06)'; this.style.color='#fff'"
                        onmouseout="this.style.background='none'; this.style.color='${n.hot ? neonPink : 'rgba(255,255,255,0.5)'}'">
                            ${n.l}
                        </button>
                    `).join('')}
                </nav>

                <!-- Search -->
                <div style="display: flex; align-items: center; gap: 8; background: rgba(255,255,255,0.06); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-radius: 50px; padding: 8px 20px; width: 240; border: 1px solid rgba(255,255,255,0.12);">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input value="${state.search}" oninput="state.search = this.value; if(event.key === 'Enter') navigate('catalog', null)" onkeydown="if(event.key === 'Enter') navigate('catalog', null)"
                    placeholder="поиск..." style="border: none; background: none; color: #fff; font-size: 12; font-family: 'Chakra Petch', sans-serif; letter-spacing: 1px; outline: none; width: 100%" />
                </div>

                <!-- Actions -->
                <div style="display: flex; gap: 8; align-items: center; flex-shrink: 0;">

                    </button>
                    <button onclick="navigate('cart')" style="border: ${cnt > 0 ? `2px solid ${neonPink}` : '2px solid rgba(255,255,255,0.1)'}; background: ${cnt > 0 ? `${neonPink}22` : 'rgba(255,255,255,0.04)'}; border-radius: 50px; cursor: pointer; padding: 8px 22px; display: flex; align-items: center; gap: 8; transition: all 0.3s; color: ${cnt > 0 ? neonPink : 'rgba(255,255,255,0.5)'}; box-shadow: ${cnt > 0 ? `0 0 20px ${neonPink}33` : 'none'};">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                        ${cnt > 0 ? `<span style="font-family: 'Chakra Petch', sans-serif; font-weight: 700; font-size: 14;">${cnt}</span>` : ''}

    function renderCard(p, wide = false) {
        const cat = catOf(p.c);
        const isFav = state.favs.includes(p.id);
        const hue = cat?.hue || 320;
        const height = wide ? 280 : 210;
        const fontSize = wide ? 90 : 64;
        const titleSize = wide ? 18 : 15;
        const priceSize = wide ? 22 : 18;

        return `
        <div onclick="navigate('product', ${p.id})" style="background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 24px; overflow: hidden; cursor: pointer; transition: all 0.4s ease; position: relative; grid-column: ${wide ? 'span 2' : 'span 1'}; border-color: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.06);"
        onmouseover="this.style.transform='translateY(-8px)'; this.style.borderColor='hsla(${hue}, 80%, 60%, 0.3)'; this.style.boxShadow='0 20px 60px rgba(0,0,0,0.3), 0 0 30px hsla(${hue}, 80%, 60%, 0.1)'"
        onmouseout="this.style.transform='none'; this.style.borderColor='rgba(255,255,255,0.06)'; this.style.boxShadow='none'">
            ${p.tag ? `
            <span style="position: absolute; top: 14; left: 14; z-index: 2; background: rgba(255,255,255,0.15); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 50px; padding: 5px 14px; font-family: 'Chakra Petch', sans-serif; font-size: 10; font-weight: 700; letter-spacing: 1.5px; color: hsla(${hue}, 80%, 70%, 1); border: 1px solid hsla(${hue}, 80%, 60%, 0.3); box-shadow: 0 0 12px hsla(${hue}, 80%, 60%, 0.15);">
                ${p.tag}
            </span>` : ''}
            
            <button onclick="event.stopPropagation(); toggleFav(${p.id})" style="position: absolute; top: 14; right: 14; z-index: 2; width: 36; height: 36; border-radius: 50%; background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.12);">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="${isFav ? neonPink : 'none'}" stroke="${isFav ? neonPink : 'rgba(255,255,255,0.4)'}" stroke-width="2">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>

            <div style="height: ${height}px; position: relative; overflow: hidden; background: radial-gradient(ellipse at 50% 80%, hsla(${hue}, 70%, 50%, 0.08), transparent 70%);">

            </div>
            
            <div style="padding: 16px 22px 22px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6;">
                    <span style="font-family: 'Chakra Petch', sans-serif; font-size: 10; font-weight: 700; letter-spacing: 2px; color: hsla(${hue}, 80%, 70%, 0.8);">${p.b}</span>
                    <div style="display: flex; align-items: center; gap: 4;">
                        <svg width="10" height="10" viewBox="0 0 20 20" fill="${neonYellow}"><path d="M10 1l2.39 4.84 5.34.78-3.87 3.77.91 5.33L10 13.27l-4.77 2.51.91-5.33L2.27 6.68l5.34-.78z"/></svg>
                        <span style="font-family: 'Chakra Petch', sans-serif; font-size: 11; color: rgba(255,255,255,0.4)">${p.r}</span>

        } else if (state.page === 'catalog') {
            content += renderCatalog();
        } else if (state.page === 'product') {
            content += renderProduct();
        } else if (state.page === 'cart') {
            content += renderCart();
        } else if (state.page === 'checkout') {
            content += renderCheckout();
        }
        content += '</main>';

        // Footer is always visible
        content += renderFooter();

        app.innerHTML = content;
    }

    // ============================================================
    // INITIALIZATION
    // ============================================================
    window.addEventListener('DOMContentLoaded', () => {
        render();
        
        // Mouse tracking for Hero gradient
        window.addEventListener('mousemove', e => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.documentElement.style.setProperty('--mouse-x', x);
            document.documentElement.style.setProperty('--mouse-y', y);
        });
    });

</script>
</body>
</html>
